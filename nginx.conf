server {
  listen 80 default_server;
  listen [::]:80 default_server;

  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml+rss;
  gzip_min_length 1024;
  gzip_vary on;

  # Astro emits /route/index.html — try clean URL variants in order
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  # Hashed asset filenames are safe to cache forever
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fonts (Fontsource) also have hashed names via Vite
  location ~* \.(woff2?|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Cache static images for a week
  location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # HTML — short cache so deploys propagate quickly
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # No server tokens
  server_tokens off;
}
